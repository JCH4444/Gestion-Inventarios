<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listar Productos</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="dashboard-page">
    <aside class="sidebar">
      <h2 class="brand">CapsuleCorp</h2>
      <nav>
        <ul>
          <li><a href="dashboard.html">🏠 Dashboard</a></li>
          <li><a href="add-product.html">➕ Agregar producto</a></li>
          <li>
            <a href="list-products.html" class="active">📋 Listar productos</a>
          </li>
        </ul>
      </nav>
    </aside>

    <main class="main-content">
      <header>
        <h1>Listado de Productos</h1>
        <a href="../index.html">
          <button class="btn-logout">Cerrar Sesión</button>
        </a>
      </header>
      <section class="content">
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Descripción</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Código</th>
            </tr>
          </thead>
          <tbody>
            <!-- filas de ejemplo -->
            <tr>
              <td>1</td>
              <td>Producto A</td>
              <td>Descripción A</td>
              <td>1000</td>
              <td>100</td>
              <td>ABC123</td>
            </tr>
            <tr>
              <td>2</td>
              <td>Producto B</td>
              <td>Descripción B</td>
              <td>2000</td>
              <td>50</td>
              <td>XYZ789</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
