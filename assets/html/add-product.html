<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agregar Producto</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="dashboard-page">
    <aside class="sidebar">
      <h2 class="brand">CapsuleCorp</h2>
      <nav>
        <ul>
          <li><a href="dashboard.php">🏠 Dashboard</a></li>
          <li><a href="add-product.html" class="active">➕ Agregar producto</a></li>
          <li><a href="list-products.html">📋 Listar productos</a></li>
        </ul>
      </nav>
    </aside>

    <main class="main-content">
      <header>
        <h1>Agregar Nuevo Producto</h1>
        <a href="../index.html">
          <button class="btn-logout">Cerrar Sesión</button>
        </a>
      </header>
      <section class="content">
        <div class="new-product">
          <form class="form-card">
            <label for="key">Código de Barras</label>
            <input class="form-data" type="text" id="prod-name" required />

            <label for="prod-name">Nombre</label>
            <input class="form-data" type="text" id="prod-name" required />

            <label for="prod-desc">Descripción</label>
            <input class="form-data" type="text" id="prod-desc" required />

            <label for="prod-price">Precio</label>
            <input class="form-data" type="number" id="prod-price" required />

            <label for="prod-stock">Stock inicial</label>
            <input class="form-data" type="number" id="prod-stock" required />

            <label for="prod-code">Código de barras</label>
            <input class="form-data" type="text" id="prod-code" required />

            <button type="submit" class="btn-primary">Guardar</button>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
